<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>个人语录工作台</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: "Microsoft YaHei", "PingFang SC", sans-serif;
    background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
    min-height: 100vh;
    color: #2c3e50;
    padding: 20px;
  }
  .container { max-width: 1200px; margin: 0 auto; }
  .main-grid {
    display: grid;
    grid-template-columns: 1fr 320px;
    gap: 20px;
    margin-top: 20px;
  }
  @media (max-width: 900px) {
    .main-grid { grid-template-columns: 1fr; }
  }

  h1 {
    color: #fff;
    font-size: 28px;
    text-align: center;
    text-shadow: 0 2px 8px rgba(0,0,0,0.2);
    margin-bottom: 8px;
  }
  .subtitle {
    color: rgba(255,255,255,0.8);
    text-align: center;
    font-size: 14px;
    margin-bottom: 20px;
  }

  .card {
    background: #fff;
    border-radius: 16px;
    box-shadow: 0 8px 32px rgba(0,0,0,0.1);
    overflow: hidden;
  }

  .quote-card {
    position: relative;
    padding: 40px 36px;
    padding-top: 70px;
    min-height: 320px;
    display: flex;
    flex-direction: column;
    justify-content: center;
    cursor: pointer;
    transition: transform 0.2s, box-shadow 0.2s;
    user-select: none;
  }
  .quote-card:hover {
    transform: translateY(-2px);
    box-shadow: 0 12px 40px rgba(0,0,0,0.15);
  }
  .quote-card:active { transform: translateY(0); }

  .quote-actions {
    position: absolute;
    top: 16px;
    right: 16px;
    display: flex;
    gap: 8px;
    z-index: 10;
  }
  .action-icon-btn {
    width: 36px;
    height: 36px;
    border-radius: 50%;
    background: #f0f2f5;
    border: none;
    display: flex;
    align-items: center;
    justify-content: center;
    cursor: pointer;
    transition: all 0.2s;
    color: #666;
  }
  .action-icon-btn:hover {
    background: #e0e4ea;
    transform: scale(1.05);
  }
  .action-icon-btn.copy-btn:hover {
    background: #e8f5e9;
    color: #4caf50;
  }
  .action-icon-btn.copy-btn.copied {
    background: #4caf50;
    color: #fff;
  }

  .quote-topic {
    font-size: 22px;
    font-weight: 600;
    color: #333;
    margin-bottom: 16px;
    line-height: 1.4;
  }
  .quote-content {
    font-size: 17px;
    color: #555;
    line-height: 1.8;
    margin-bottom: 20px;
    white-space: pre-wrap;
  }
  .quote-meta {
    display: flex;
    flex-wrap: wrap;
    gap: 10px;
    margin-top: auto;
    padding-top: 16px;
    border-top: 1px solid #f0f0f0;
  }
  .meta-tag {
    display: inline-block;
    padding: 4px 12px;
    background: #f0f4ff;
    color: #667eea;
    border-radius: 20px;
    font-size: 13px;
  }
  .meta-tag.from { background: #fdf0e5; color: #e67e22; }
  .meta-tag.who { background: #e8f8f0; color: #27ae60; }
  .meta-tag.len { background: #f5f0fa; color: #9b59b6; }

  .click-hint {
    position: absolute;
    bottom: 16px;
    left: 50%;
    transform: translateX(-50%);
    font-size: 12px;
    color: #aaa;
  }

  .action-bar {
    display: flex;
    flex-wrap: wrap;
    gap: 8px;
    padding: 16px 20px;
    background: #fafbfc;
    border-top: 1px solid #eee;
  }
  .btn {
    padding: 9px 18px;
    border: none;
    border-radius: 8px;
    cursor: pointer;
    font-size: 14px;
    font-family: inherit;
    transition: all 0.2s;
    display: inline-flex;
    align-items: center;
    gap: 5px;
  }
  .btn:hover { transform: translateY(-1px); }
  .btn:active { transform: translateY(0); }
  .btn-helpful { background: #42b983; color: #fff; }
  .btn-helpful:hover { background: #3aa876; }
  .btn-done { background: #3eafef; color: #fff; }
  .btn-done:hover { background: #369fd8; }
  .btn-learned { background: #f3a860; color: #fff; }
  .btn-learned:hover { background: #e89850; }
  .btn-edit { background: #667eea; color: #fff; }
  .btn-edit:hover { background: #5a6fd8; }
  .btn-add { background: #9c88ff; color: #fff; }
  .btn-add:hover { background: #8b77f0; }
  .btn-delete { background: #e53935; color: #fff; }
  .btn-delete:hover { background: #d03030; }
  .btn-next { background: #7f8c8d; color: #fff; margin-left: auto; }
  .btn-next:hover { background: #6c7a7b; }

  .side-panel { display: flex; flex-direction: column; gap: 20px; }

  .stats-card { padding: 20px; }
  .stats-title {
    font-size: 16px;
    font-weight: 600;
    margin-bottom: 16px;
    color: #333;
    display: flex;
    align-items: center;
    gap: 8px;
  }
  .stats-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 12px;
    margin-bottom: 16px;
  }
  .stat-item {
    background: #f8f9fb;
    border-radius: 10px;
    padding: 14px;
    text-align: center;
  }
  .stat-num {
    font-size: 24px;
    font-weight: 700;
    color: #667eea;
    line-height: 1.2;
  }
  .stat-label {
    font-size: 12px;
    color: #888;
    margin-top: 4px;
  }
  .stat-item.today .stat-num { color: #42b983; }
  .stat-item.added .stat-num { color: #f39c12; }

  .history-section { margin-top: 12px; }
  .history-title {
    font-size: 14px;
    font-weight: 600;
    color: #555;
    margin-bottom: 10px;
    display: flex;
    justify-content: space-between;
    align-items: center;
  }
  .clear-btn {
    font-size: 12px;
    color: #999;
    cursor: pointer;
    background: none;
    border: none;
    font-family: inherit;
  }
  .clear-btn:hover { color: #e53935; }
  .history-list {
    max-height: 180px;
    overflow-y: auto;
    border: 1px solid #eee;
    border-radius: 8px;
  }
  .history-item {
    padding: 10px 12px;
    border-bottom: 1px solid #f0f0f0;
    font-size: 13px;
    cursor: pointer;
    transition: background 0.15s;
  }
  .history-item:last-child { border-bottom: none; }
  .history-item:hover { background: #f8f9fb; }
  .history-item-topic {
    color: #333;
    font-weight: 500;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }
  .history-item-time {
    font-size: 11px;
    color: #aaa;
    margin-top: 3px;
  }
  .history-item.added .history-item-topic { color: #f39c12; }
  .empty-history {
    padding: 24px;
    text-align: center;
    color: #bbb;
    font-size: 13px;
  }

  .drawer-overlay {
    display: none;
    position: fixed;
    top: 0; left: 0; right: 0; bottom: 0;
    background: rgba(0,0,0,0.4);
    z-index: 1000;
  }
  .drawer-overlay.show { display: block; }
  .drawer {
    position: fixed;
    top: 0; right: -420px;
    width: 400px;
    max-width: 90vw;
    height: 100vh;
    background: #fff;
    z-index: 1001;
    transition: right 0.3s ease;
    box-shadow: -4px 0 20px rgba(0,0,0,0.1);
    display: flex;
    flex-direction: column;
  }
  .drawer.show { right: 0; }
  .drawer-header {
    padding: 20px 24px;
    border-bottom: 1px solid #eee;
    display: flex;
    justify-content: space-between;
    align-items: center;
  }
  .drawer-header h3 { font-size: 18px; color: #333; }
  .close-drawer {
    width: 32px; height: 32px;
    border: none;
    background: #f5f5f5;
    border-radius: 50%;
    cursor: pointer;
    font-size: 20px;
    color: #666;
    display: flex;
    align-items: center;
    justify-content: center;
  }
  .close-drawer:hover { background: #e8e8e8; }
  .drawer-body {
    flex: 1;
    overflow-y: auto;
    padding: 20px 24px;
  }
  .drawer-footer {
    padding: 16px 24px;
    border-top: 1px solid #eee;
    display: flex;
    gap: 10px;
  }
  .drawer-footer .btn { flex: 1; justify-content: center; }

  .form-group { margin-bottom: 18px; }
  .form-group label {
    display: block;
    font-size: 13px;
    color: #555;
    margin-bottom: 6px;
    font-weight: 500;
  }
  .form-group input, .form-group select, .form-group textarea {
    width: 100%;
    padding: 10px 12px;
    border: 1px solid #dcdfe6;
    border-radius: 8px;
    font-size: 14px;
    font-family: inherit;
    transition: border-color 0.2s;
  }
  .form-group input:focus, .form-group select:focus, .form-group textarea:focus {
    outline: none;
    border-color: #667eea;
  }
  .form-group textarea { resize: vertical; min-height: 90px; }
  .form-row { display: flex; gap: 12px; }
  .form-row .form-group { flex: 1; }

  .section-title {
    font-size: 15px;
    font-weight: 600;
    color: #333;
    margin: 20px 0 12px;
    padding-bottom: 8px;
    border-bottom: 2px solid #667eea;
    display: inline-block;
  }
  .section-title:first-child { margin-top: 0; }

  .loading {
    display: flex;
    align-items: center;
    justify-content: center;
    color: #999;
    font-size: 15px;
    padding: 40px;
  }
  .loading::before {
    content: '';
    width: 20px; height: 20px;
    border: 2px solid #ddd;
    border-top-color: #667eea;
    border-radius: 50%;
    margin-right: 10px;
    animation: spin 0.8s linear infinite;
  }
  @keyframes spin { to { transform: rotate(360deg); } }

  .toast {
    position: fixed;
    top: 30px;
    left: 50%;
    transform: translateX(-50%) translateY(-80px);
    padding: 12px 24px;
    background: #333;
    color: #fff;
    border-radius: 8px;
    font-size: 14px;
    z-index: 2000;
    opacity: 0;
    transition: all 0.3s;
    pointer-events: none;
  }
  .toast.show {
    opacity: 1;
    transform: translateX(-50%) translateY(0);
  }
  .toast.success { background: #42b983; }
  .toast.error { background: #e53935; }

  .modal-overlay {
    display: none;
    position: fixed;
    top: 0; left: 0; right: 0; bottom: 0;
    background: rgba(0,0,0,0.5);
    z-index: 1500;
    align-items: center;
    justify-content: center;
  }
  .modal-overlay.show { display: flex; }
  .modal {
    background: #fff;
    border-radius: 16px;
    width: 90%;
    max-width: 520px;
    max-height: 90vh;
    overflow-y: auto;
    animation: modalIn 0.25s ease;
  }
  @keyframes modalIn {
    from { opacity: 0; transform: scale(0.95) translateY(10px); }
    to { opacity: 1; transform: scale(1) translateY(0); }
  }
  .modal-header {
    padding: 20px 24px;
    border-bottom: 1px solid #eee;
    display: flex;
    justify-content: space-between;
    align-items: center;
  }
  .modal-header h3 { font-size: 18px; color: #333; }
  .modal-body { padding: 20px 24px; }
  .modal-footer {
    padding: 16px 24px;
    border-top: 1px solid #eee;
    display: flex;
    justify-content: flex-end;
    gap: 10px;
  }
  .btn-secondary:hover { background: #e4e7eb; }

  /* 多选框样式 */
  .checkbox-group {
    display: flex;
    flex-wrap: wrap;
    gap: 8px;
    padding: 10px;
    background: #f8f9fb;
    border: 1px solid #dcdfe6;
    border-radius: 8px;
    min-height: 44px;
    max-height: 160px;
    overflow-y: auto;
  }
  .checkbox-item {
    display: inline-flex;
    align-items: center;
    gap: 5px;
    padding: 5px 10px;
    background: #fff;
    border: 1px solid #dcdfe6;
    border-radius: 20px;
    cursor: pointer;
    font-size: 13px;
    transition: all 0.2s;
    user-select: none;
  }
  .checkbox-item:hover {
    border-color: #667eea;
    background: #f0f4ff;
  }
  .checkbox-item.checked {
    background: #667eea;
    border-color: #667eea;
    color: #fff;
  }
  .checkbox-item input[type="checkbox"] {
    display: none;
  }
  .add-category-row {
    display: flex;
    gap: 8px;
    margin-top: 8px;
  }
  .btn-sm {
    padding: 8px 12px;
    font-size: 14px;
  }
  .loading-mini {
    font-size: 13px;
    color: #999;
    padding: 8px;
  }
  .category-delete {
    margin-left: 4px;
    color: #fff;
    opacity: 0.7;
    font-size: 11px;
    cursor: pointer;
  }
  .category-delete:hover {
    opacity: 1;
    color: #ff6b6b;
  }
</style>
</head>
<body>
<div class="container">
  <h1>✨ 个人语录工作台</h1>
  <p class="subtitle">每日一句，点亮思维</p>

  <div class="main-grid">
    <div>
      <div class="card">
        <div class="quote-card" id="quoteCard" onclick="handleCardClick(event)">
          <div class="quote-actions">
            <button class="action-icon-btn copy-btn" onclick="event.stopPropagation(); copyQuote()" title="复制语录">
              <svg viewBox="0 0 24 24" width="18" height="18" fill="currentColor"><path d="M16 1H4c-1.1 0-2 .9-2 2v14h2V3h12V1zm3 4H8c-1.1 0-2 .9-2 2v14c0 1.1.9 2 2 2h11c1.1 0 2-.9 2-2V7c0-1.1-.9-2-2-2zm0 16H8V7h11v14z"/></svg>
            </button>
            <button class="action-icon-btn" onclick="event.stopPropagation(); openSettings()" title="设置">
              <svg viewBox="0 0 24 24" width="18" height="18" fill="currentColor"><path d="M19.14 12.94c.04-.3.06-.61.06-.94 0-.32-.02-.64-.07-.94l2.03-1.58c.18-.14.23-.41.12-.61l-1.92-3.32c-.12-.22-.37-.29-.59-.22l-2.39.96c-.5-.38-1.03-.7-1.62-.94l-.36-2.54c-.04-.24-.24-.41-.48-.41h-3.84c-.24 0-.43.17-.47.41l-.36 2.54c-.59.24-1.13.57-1.62.94l-2.39-.96c-.22-.08-.47 0-.59.22L2.74 8.87c-.12.21-.08.47.12.61l2.03 1.58c-.05.3-.09.63-.09.94s.02.64.07.94l-2.03 1.58c-.18.14-.23.41-.12.61l1.92 3.32c.12.22.37.29.59.22l2.39-.96c.5.38 1.03.7 1.62.94l.36 2.54c.05.24.24.41.48.41h3.84c.24 0 .44-.17.47-.41l.36-2.54c.59-.24 1.13-.56 1.62-.94l2.39.96c.22.08.47 0 .59-.22l1.92-3.32c.12-.22.07-.47-.12-.61l-2.01-1.58zM12 15.6c-1.98 0-3.6-1.62-3.6-3.6s1.62-3.6 3.6-3.6 3.6 1.62 3.6 3.6-1.62 3.6-3.6 3.6z"/></svg>
            </button>
          </div>
          <div id="quoteContent">
            <div class="loading">加载中...</div>
          </div>
          <div class="click-hint">点击卡片切换下一条 →</div>
        </div>

        <div class="action-bar">
          <button class="btn btn-helpful" onclick="sendFeedback('helpful')">👍 有帮助</button>
          <button class="btn btn-done" onclick="sendFeedback('done')">✅ 做到了</button>
          <button class="btn btn-learned" onclick="sendFeedback('received')">📚 学到了</button>
          <button class="btn btn-edit" onclick="openEditModal()">✏️ 编辑</button>
          <button class="btn btn-add" onclick="openAddModal()">➕ 新增</button>
          <button class="btn btn-delete" onclick="confirmDelete()">🗑️ 删除</button>
          <button class="btn btn-next" onclick="loadNext()">下一条 →</button>
        </div>
      </div>
    </div>

    <div class="side-panel">
      <div class="card stats-card">
        <div class="stats-title">📊 统计概览</div>
        <div class="stats-grid">
          <div class="stat-item today">
            <div class="stat-num" id="todayCount">0</div>
            <div class="stat-label">今日推送</div>
          </div>
          <div class="stat-item">
            <div class="stat-num" id="totalCount">0</div>
            <div class="stat-label">累计推送</div>
          </div>
          <div class="stat-item added">
            <div class="stat-num" id="addedCount">0</div>
            <div class="stat-label">近期新增</div>
          </div>
          <div class="stat-item">
            <div class="stat-num" id="feedbackCount">0</div>
            <div class="stat-label">反馈次数</div>
          </div>
        </div>

        <div class="history-section">
          <div class="history-title">
            <span>📜 推送历史</span>
            <button class="clear-btn" onclick="clearPushHistory()">清空</button>
          </div>
          <div class="history-list" id="pushHistory">
            <div class="empty-history">暂无记录</div>
          </div>
        </div>

        <div class="history-section" style="margin-top: 16px;">
          <div class="history-title">
            <span>🆕 新增记录</span>
            <button class="clear-btn" onclick="clearAddHistory()">清空</button>
          </div>
          <div class="history-list" id="addHistory">
            <div class="empty-history">暂无记录</div>
          </div>
        </div>
      </div>
    </div>
  </div>
</div>

<div class="drawer-overlay" id="drawerOverlay" onclick="closeSettings()"></div>
<div class="drawer" id="settingsDrawer">
  <div class="drawer-header">
    <h3>⚙️ 推送设置</h3>
    <button class="close-drawer" onclick="closeSettings()">&times;</button>
  </div>
  <div class="drawer-body">
    <div class="section-title">API 配置</div>
    <div class="form-group">
      <label>API 地址</label>
      <input type="text" id="setApiBase" placeholder="https://dancehole.cn/api/self-system-message">
    </div>
    <div class="form-group">
      <label>X-Token</label>
      <input type="text" id="setToken" placeholder="输入鉴权 Token">
    </div>

    <div class="section-title">推送参数</div>
    <div class="form-group">
      <label>分类过滤（可多选，留空=全部）</label>
      <div id="categoryFilterContainer" class="checkbox-group">
        <div class="loading-mini">加载分类...</div>
      </div>
      <div class="add-category-row">
        <input type="text" id="newCategoryInput" placeholder="新增分类..." style="flex:1">
        <button class="btn btn-sm" onclick="addNewCategory('filter')">+</button>
      </div>
    </div>
    <div class="form-row">
      <div class="form-group">
        <label>最小长度</label>
        <input type="number" id="setMinLen" value="0">
      </div>
      <div class="form-group">
        <label>最大长度</label>
        <input type="number" id="setMaxLen" value="30">
      </div>
    </div>
    <div class="form-group">
      <label>返回格式</label>
      <select id="setEncode">
        <option value="json">JSON（完整版）</option>
        <option value="text">纯文本</option>
      </select>
    </div>

    <div class="section-title">显示设置</div>
    <div class="form-group">
      <label>
        <input type="checkbox" id="setAutoSave" checked>
        自动保存配置到本地
      </label>
    </div>
  </div>
  <div class="drawer-footer">
    <button class="btn btn-secondary" onclick="resetSettings()">恢复默认</button>
    <button class="btn btn-edit" onclick="applySettings()">应用并刷新</button>
  </div>
</div>

<div class="modal-overlay" id="editModal">
  <div class="modal">
    <div class="modal-header">
      <h3 id="editModalTitle">编辑语录</h3>
      <button class="close-drawer" onclick="closeEditModal()">&times;</button>
    </div>
    <div class="modal-body">
      <div class="form-group">
        <label>标题 (topic) *</label>
        <input type="text" id="editTopic" placeholder="主题/标题">
      </div>
      <div class="form-group">
        <label>分类（可多选）</label>
        <div id="editCategoryContainer" class="checkbox-group">
          <div class="loading-mini">加载分类...</div>
        </div>
      </div>
      <div class="form-row">
        <div class="form-group" style="flex:1">
          <label>作者 (from_who)</label>
          <input type="text" id="editFromWho" placeholder="作者/来源人物">
        </div>
      </div>
      <div class="form-group">
        <label>出处 (from/tag)</label>
        <input type="text" id="editTag" placeholder="标签/出处">
      </div>
      <div class="form-group">
        <label>正文 (plaintext) *</label>
        <textarea id="editContent" placeholder="语录正文内容"></textarea>
      </div>
    </div>
    <div class="modal-footer">
      <button class="btn btn-secondary" onclick="closeEditModal()">取消</button>
      <button class="btn btn-edit" id="editSaveBtn" onclick="saveEdit()">保存</button>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
const STORAGE_KEY = 'quote_workbench_config';
const HISTORY_KEY = 'quote_workbench_history';

let currentId = null;
let currentData = null;
let config = {};
let history = { push: [], add: [], stats: { total: 0, today: 0, todayDate: '', feedback: 0 } };
let categories = []; // 分类列表
let selectedFilterCategories = []; // 设置面板选中的分类
let selectedEditCategories = []; // 编辑弹窗选中的分类

// ==================== 前端节流（防止频繁点击） ====================
let _lastReqTime = 0;
const _MIN_REQ_INTERVAL = 1000; // 1 秒（配合后端 2次/秒）

function _checkThrottle() {
  const now = Date.now();
  if (now - _lastReqTime < _MIN_REQ_INTERVAL) {
    showToast('你点的太快了，等会再试试吧', 'error');
    return false;
  }
  _lastReqTime = now;
  return true;
}

function init() {
  loadConfig();
  loadHistory();
  loadCategories();
  applyConfigToUI();
  updateStatsUI();
  renderHistory();
  loadNext();
}

function loadConfig() {
  try {
    const saved = localStorage.getItem(STORAGE_KEY);
    if (saved) {
      config = JSON.parse(saved);
    }
  } catch (e) {}
  // 自动迁移：如果 localStorage 里存的是 127.0.0.1 的旧地址或相对路径，更新到完整 URL
  if (config.apiBase && (
    config.apiBase.indexOf('127.0.0.1') >= 0 ||
    config.apiBase.indexOf('/api') === 0
  )) {
    config.apiBase = 'https://dancehole.cn/api/self-system-message';
    saveConfig();
  }
  if (!config.apiBase) config.apiBase = 'https://dancehole.cn/api/self-system-message';
  if (!config.token) config.token = '';
  if (!config.category) config.category = '';
  if (!config.categories) config.categories = []; // 多选分类
  if (config.minLength === undefined) config.minLength = 0;
  if (config.maxLength === undefined) config.maxLength = 30;
  if (!config.encode) config.encode = 'json';
  selectedFilterCategories = config.categories || [];
}

function saveConfig() {
  try {
    localStorage.setItem(STORAGE_KEY, JSON.stringify(config));
  } catch (e) {}
}

function applyConfigToUI() {
  document.getElementById('setApiBase').value = config.apiBase;
  document.getElementById('setToken').value = config.token;
  document.getElementById('setMinLen').value = config.minLength;
  document.getElementById('setMaxLen').value = config.maxLength;
  document.getElementById('setEncode').value = config.encode;
  // 渲染分类多选框（会在 loadCategories 后渲染）
  if (categories.length > 0) {
    renderCategoryFilter();
  }
}

function loadHistory() {
  try {
    const saved = localStorage.getItem(HISTORY_KEY);
    if (saved) {
      history = JSON.parse(saved);
    }
  } catch (e) {}
  const today = new Date().toDateString();
  if (history.stats.todayDate !== today) {
    history.stats.today = 0;
    history.stats.todayDate = today;
  }
  if (!history.push) history.push = [];
  if (!history.add) history.add = [];
  if (!history.stats) history.stats = { total: 0, today: 0, todayDate: today, feedback: 0 };
  // 兼容旧格式（只有 topic/content 的历史数据）
  history.push = history.push.map(item => ({
    id: item.id || 0,
    topic: item.topic || '',
    content: item.content || '',
    type: item.type || '',
    from: item.from || '',
    from_who: item.from_who || '',
    length: item.length || 0,
    created_at: item.created_at || 0,
    time: item.time || Date.now()
  }));
}

function saveHistory() {
  try {
    localStorage.setItem(HISTORY_KEY, JSON.stringify(history));
  } catch (e) {}
}

function updateStatsUI() {
  document.getElementById('todayCount').textContent = history.stats.today;
  document.getElementById('totalCount').textContent = history.stats.total;
  document.getElementById('addedCount').textContent = history.add.length;
  document.getElementById('feedbackCount').textContent = history.stats.feedback;
}

function addPushHistory(data) {
  if (!data || !data.id) return;
  history.stats.total++;
  history.stats.today++;
  // 存储完整的语录数据
  history.push.unshift({
    id: data.id,
    topic: data.topic || '',
    content: data.content || '',
    type: data.type || '',
    from: data.from || '',
    from_who: data.from_who || '',
    length: data.length || 0,
    created_at: data.created_at || 0,
    time: Date.now()
  });
  if (history.push.length > 50) history.push = history.push.slice(0, 50);
  saveHistory();
  updateStatsUI();
  renderHistory();
}

function addAddHistory(id, topic, content) {
  history.add.unshift({
    id: id,
    topic: topic || '',
    content: content || '',
    time: Date.now()
  });
  if (history.add.length > 50) history.add = history.add.slice(0, 50);
  saveHistory();
  updateStatsUI();
  renderHistory();
}

function renderHistory() {
  const pushEl = document.getElementById('pushHistory');
  if (history.push.length === 0) {
    pushEl.innerHTML = '<div class="empty-history">暂无记录</div>';
  } else {
    pushEl.innerHTML = history.push.map(item => `
      <div class="history-item" onclick="loadById(${item.id})">
        <div class="history-item-topic">${escapeHtml(item.topic || item.content || '无标题')}</div>
        <div class="history-item-time">${formatTime(item.time)}</div>
      </div>
    `).join('');
  }

  const addEl = document.getElementById('addHistory');
  if (history.add.length === 0) {
    addEl.innerHTML = '<div class="empty-history">暂无记录</div>';
  } else {
    addEl.innerHTML = history.add.map(item => `
      <div class="history-item added" onclick="loadById(${item.id})">
        <div class="history-item-topic">${escapeHtml(item.topic || '无标题')}</div>
        <div class="history-item-time">${formatTime(item.time)}</div>
      </div>
    `).join('');
  }
}

function clearPushHistory() {
  if (!confirm('确定清空推送历史吗？')) return;
  history.push = [];
  saveHistory();
  renderHistory();
  showToast('已清空', 'success');
}

function clearAddHistory() {
  if (!confirm('确定清空新增记录吗？')) return;
  history.add = [];
  saveHistory();
  updateStatsUI();
  renderHistory();
  showToast('已清空', 'success');
}

// ==================== 分类管理 ====================
async function loadCategories() {
  try {
    const res = await fetch(`${getApiBase()}/categories`, { headers: buildHeaders() });
    if (!res.ok) return;
    const data = await res.json();
    categories = data.categories || [];
    renderCategoryFilter();
    renderEditCategoryFilter();
  } catch (e) {
    console.error('加载分类失败:', e);
  }
}

function renderCategoryFilter() {
  const container = document.getElementById('categoryFilterContainer');
  if (!container) return;
  container.innerHTML = categories.map(cat => `
    <label class="checkbox-item ${selectedFilterCategories.includes(cat.name) ? 'checked' : ''}"
           onclick="toggleCategoryFilter('${escapeHtml(cat.name)}')">
      <input type="checkbox" ${selectedFilterCategories.includes(cat.name) ? 'checked' : ''}>
      ${escapeHtml(cat.name)}
    </label>
  `).join('');
}

function toggleCategoryFilter(name) {
  const idx = selectedFilterCategories.indexOf(name);
  if (idx >= 0) {
    selectedFilterCategories.splice(idx, 1);
  } else {
    selectedFilterCategories.push(name);
  }
  renderCategoryFilter();
}

function renderEditCategoryFilter() {
  const container = document.getElementById('editCategoryContainer');
  if (!container) return;
  container.innerHTML = categories.map(cat => `
    <label class="checkbox-item ${selectedEditCategories.includes(cat.name) ? 'checked' : ''}"
           onclick="toggleEditCategory('${escapeHtml(cat.name)}')">
      <input type="checkbox" ${selectedEditCategories.includes(cat.name) ? 'checked' : ''}>
      ${escapeHtml(cat.name)}
    </label>
  `).join('');
}

function toggleEditCategory(name) {
  const idx = selectedEditCategories.indexOf(name);
  if (idx >= 0) {
    selectedEditCategories.splice(idx, 1);
  } else {
    selectedEditCategories.push(name);
  }
  renderEditCategoryFilter();
}

async function addNewCategory(context) {
  let inputId = context === 'filter' ? 'newCategoryInput' : 'newCategoryInput';
  const name = document.getElementById(inputId).value.trim();
  if (!name) {
    showToast('请输入分类名称', 'error');
    return;
  }
  try {
    const res = await fetch(`${getApiBase()}/categories`, {
      method: 'POST',
      headers: buildHeaders(),
      body: JSON.stringify({ name })
    });
    const data = await res.json().catch(() => ({}));
    if (data.status === 'ok') {
      await loadCategories();
      document.getElementById(inputId).value = '';
      showToast('分类新增成功！', 'success');
    } else {
      showToast(data.msg || '新增失败', 'error');
    }
  } catch (e) {
    showToast('请求失败', 'error');
  }
}

function formatTime(ts) {
  const d = new Date(ts);
  const now = new Date();
  const diff = now - d;
  if (diff < 60000) return '刚刚';
  if (diff < 3600000) return Math.floor(diff / 60000) + ' 分钟前';
  if (diff < 86400000 && d.toDateString() === now.toDateString()) {
    return d.getHours().toString().padStart(2, '0') + ':' + d.getMinutes().toString().padStart(2, '0');
  }
  return (d.getMonth() + 1) + '/' + d.getDate() + ' ' + d.getHours().toString().padStart(2, '0') + ':' + d.getMinutes().toString().padStart(2, '0');
}

function escapeHtml(str) {
  if (str == null) return '';
  const div = document.createElement('div');
  div.appendChild(document.createTextNode(str));
  return div.innerHTML;
}

function showToast(msg, type = '') {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.className = 'toast show ' + type;
  setTimeout(() => { t.className = 'toast ' + type; }, 2000);
}

function getApiBase() {
  return config.apiBase.replace(/\/+$/, '');
}

function buildHeaders() {
  return {
    'Content-Type': 'application/json',
    'X-Token': config.token
  };
}

function buildPushUrl() {
  const params = new URLSearchParams();
  params.set('min_length', config.minLength);
  params.set('max_length', config.maxLength);
  params.set('encode', config.encode);
  // 支持多选分类（用逗号连接传给后端）
  if (selectedFilterCategories.length > 0) {
    params.set('c', selectedFilterCategories.join(','));
  }
  return `${getApiBase()}/push?${params.toString()}`;
}

async function loadNext() {
  if (!_checkThrottle()) return;
  const container = document.getElementById('quoteContent');
  container.innerHTML = '<div class="loading">加载中...</div>';
  try {
    const res = await fetch(buildPushUrl(), { headers: buildHeaders() });
    if (res.status === 401) {
      container.innerHTML = '<div style="text-align:center;color:#e53935;padding:40px;">鉴权失败 (401)<br><small>请检查 X-Token 设置</small></div>';
      showToast('鉴权失败，请检查 Token', 'error');
      return;
    }
    if (!res.ok) {
      let msg = res.status;
      try {
        const data = await res.json();
        msg = data.msg || msg;
      } catch (e) {}
      container.innerHTML = `<div style="text-align:center;color:#e53935;padding:40px;">加载失败<br><small>${escapeHtml(msg)}</small></div>`;
      return;
    }

    const enc = config.encode;
    if (enc === 'text') {
      const text = await res.text();
      currentId = null;
      currentData = { content: text };
      container.innerHTML = `
        <div class="quote-topic">📖 语录</div>
        <div class="quote-content">${escapeHtml(text)}</div>
      `;
      history.stats.total++;
      history.stats.today++;
      saveHistory();
      updateStatsUI();
      return;
    }

    const data = await res.json();
    currentId = data.id;
    currentData = data;
    addPushHistory(data);
    renderQuote(data);
  } catch (e) {
    container.innerHTML = `<div style="text-align:center;color:#e53935;padding:40px;">加载失败<br><small>${escapeHtml(e.message)}</small></div>`;
  }
}

async function loadById(id) {
  if (!_checkThrottle()) return;
  if (!id) return;
  // 从历史记录中查找
  const item = history.push.find(h => h.id === id);
  if (item) {
    // 回溯历史：展示历史数据，不改变 currentId
    currentId = item.id;
    currentData = item;
    renderQuote(item);
    showToast('已回溯到历史语录', 'success');
  } else {
    // 如果历史中没有，从 API 获取
    const container = document.getElementById('quoteContent');
    container.innerHTML = '<div class="loading">加载中...</div>';
    try {
      const res = await fetch(`${getApiBase()}/push?encode=json`, { headers: buildHeaders() });
      if (!res.ok) { loadNext(); return; }
      const data = await res.json();
      currentId = data.id;
      currentData = data;
      renderQuote(data);
    } catch (e) {
      loadNext();
    }
  }
}

function renderQuote(data) {
  const container = document.getElementById('quoteContent');
  const typeTag = data.type ? `<span class="meta-tag">${escapeHtml(data.type)}</span>` : '';
  const fromTag = data.from ? `<span class="meta-tag from">出处：${escapeHtml(data.from)}</span>` : '';
  const whoTag = data.from_who ? `<span class="meta-tag who">${escapeHtml(data.from_who)}</span>` : '';
  const lenTag = data.length ? `<span class="meta-tag len">${data.length} 字</span>` : '';

  container.innerHTML = `
    <div class="quote-topic">${escapeHtml(data.topic || '无标题')}</div>
    <div class="quote-content">${escapeHtml(data.content || '')}</div>
    <div class="quote-meta">
      ${typeTag}${fromTag}${whoTag}${lenTag}
    </div>
  `;
}

function handleCardClick(e) {
  if (e.target.closest('.action-icon-btn')) return;
  loadNext();
}

// 一键复制语录
async function copyQuote() {
  if (!currentData) {
    showToast('没有可复制的语录', 'error');
    return;
  }
  const topic = currentData.topic || '';
  const content = currentData.content || '';
  const type = currentData.type || '';
  const text = `【${topic}】\n${content}\n---${type ? '分类：' + type : ''}`;
  
  try {
    await navigator.clipboard.writeText(text);
    const btn = document.querySelector('.copy-btn');
    btn.classList.add('copied');
    showToast('已复制到剪贴板！', 'success');
    setTimeout(() => btn.classList.remove('copied'), 1500);
  } catch (e) {
    // 降级方案
    const textarea = document.createElement('textarea');
    textarea.value = text;
    textarea.style.position = 'fixed';
    textarea.style.opacity = '0';
    document.body.appendChild(textarea);
    textarea.select();
    document.execCommand('copy');
    document.body.removeChild(textarea);
    showToast('已复制到剪贴板！', 'success');
  }
}

async function sendFeedback(type) {
  if (!_checkThrottle()) return;
  if (!currentId) {
    showToast('text 模式不支持反馈', 'error');
    return;
  }
  try {
    const res = await fetch(`${getApiBase()}/feedback`, {
      method: 'POST',
      headers: buildHeaders(),
      body: JSON.stringify({ id: currentId, type: type })
    });
    const data = await res.json().catch(() => ({}));
    if (data.status === 'ok') {
      history.stats.feedback++;
      saveHistory();
      updateStatsUI();
      showToast('反馈成功！', 'success');
      loadNext();
    } else {
      showToast('反馈失败：' + (data.msg || '未知错误'), 'error');
    }
  } catch (e) {
    showToast('请求失败：' + e.message, 'error');
  }
}

function openSettings() {
  document.getElementById('settingsDrawer').classList.add('show');
  document.getElementById('drawerOverlay').classList.add('show');
}

function closeSettings() {
  document.getElementById('settingsDrawer').classList.remove('show');
  document.getElementById('drawerOverlay').classList.remove('show');
}

function applySettings() {
  config.apiBase = document.getElementById('setApiBase').value.trim();
  config.token = document.getElementById('setToken').value.trim();
  config.categories = [...selectedFilterCategories]; // 保存多选分类
  config.minLength = parseInt(document.getElementById('setMinLen').value) || 0;
  config.maxLength = parseInt(document.getElementById('setMaxLen').value) || 30;
  config.encode = document.getElementById('setEncode').value;
  saveConfig();
  closeSettings();
  loadNext();
  showToast('设置已应用', 'success');
}

function resetSettings() {
  if (!confirm('确定恢复默认设置吗？')) return;
  config = {
    apiBase: 'https://dancehole.cn/api/self-system-message',
    token: '',
    categories: [],
    minLength: 0,
    maxLength: 30,
    encode: 'json'
  };
  selectedFilterCategories = [];
  applyConfigToUI();
  saveConfig();
  showToast('已恢复默认', 'success');
}

function openEditModal() {
  if (!currentData) {
    showToast('未选择语录', 'error');
    return;
  }
  document.getElementById('editModalTitle').textContent = '编辑语录';
  document.getElementById('editTopic').value = currentData.topic || '';
  // 解析当前分类（支持逗号分隔的多分类）
  const currentTypes = (currentData.type || '').split(',').map(t => t.trim()).filter(t => t);
  selectedEditCategories = currentTypes;
  renderEditCategoryFilter();
  document.getElementById('editTag').value = currentData.from || '';
  document.getElementById('editFromWho').value = currentData.from_who || '';
  document.getElementById('editContent').value = currentData.content || '';
  document.getElementById('editSaveBtn').textContent = '保存修改';
  document.getElementById('editSaveBtn').onclick = saveEdit;
  document.getElementById('editModal').classList.add('show');
}

function openAddModal() {
  document.getElementById('editModalTitle').textContent = '新增语录';
  document.getElementById('editTopic').value = '';
  // 新增时使用当前过滤选中的分类作为默认
  selectedEditCategories = [...selectedFilterCategories];
  renderEditCategoryFilter();
  document.getElementById('editTag').value = '';
  document.getElementById('editFromWho').value = '';
  document.getElementById('editContent').value = '';
  document.getElementById('editSaveBtn').textContent = '新增';
  document.getElementById('editSaveBtn').onclick = saveAdd;
  document.getElementById('editModal').classList.add('show');
}

function closeEditModal() {
  document.getElementById('editModal').classList.remove('show');
}

async function saveEdit() {
  if (!_checkThrottle()) return;
  if (!currentId) {
    showToast('未选择语录', 'error');
    return;
  }
  const topic = document.getElementById('editTopic').value.trim();
  const tag = document.getElementById('editTag').value.trim();
  const from_who = document.getElementById('editFromWho').value.trim();
  const content = document.getElementById('editContent').value.trim();
  // 多选分类用逗号连接
  const class_ = selectedEditCategories.join(',');
  if (!topic || !content) {
    showToast('标题和内容不能为空', 'error');
    return;
  }
  try {
    const res = await fetch(`${getApiBase()}/edit`, {
      method: 'PUT',
      headers: buildHeaders(),
      body: JSON.stringify({ id: currentId, topic, plaintext: content, class: class_, tag, from_who })
    });
    const data = await res.json().catch(() => ({}));
    if (data.status === 'ok') {
      showToast('修改成功！', 'success');
      closeEditModal();
      loadNext();
    } else {
      showToast('修改失败：' + (data.msg || '未知错误'), 'error');
    }
  } catch (e) {
    showToast('请求失败：' + e.message, 'error');
  }
}

async function saveAdd() {
  if (!_checkThrottle()) return;
  const topic = document.getElementById('editTopic').value.trim();
  const tag = document.getElementById('editTag').value.trim();
  const from_who = document.getElementById('editFromWho').value.trim();
  const content = document.getElementById('editContent').value.trim();
  // 多选分类用逗号连接
  const class_ = selectedEditCategories.join(',');
  if (!topic || !content) {
    showToast('标题和内容不能为空', 'error');
    return;
  }
  try {
    const res = await fetch(`${getApiBase()}/add`, {
      method: 'POST',
      headers: buildHeaders(),
      body: JSON.stringify({ topic, plaintext: content, class: class_, tag, from_who })
    });
    const data = await res.json().catch(() => ({}));
    if (data.status === 'ok') {
      addAddHistory(data.id, topic, content);
      showToast('新增成功！', 'success');
      closeEditModal();
      currentId = data.id;
      currentData = { id: data.id, topic, content, type: class_, from: tag, from_who, length: content.length };
      renderQuote(currentData);
    } else {
      showToast('新增失败：' + (data.msg || '未知错误'), 'error');
    }
  } catch (e) {
    showToast('请求失败：' + e.message, 'error');
  }
}

async function confirmDelete() {
  if (!_checkThrottle()) return;
  if (!currentId) {
    showToast('未选择语录', 'error');
    return;
  }
  if (!confirm('确定要删除这条语录吗？此操作不可恢复！')) return;
  try {
    const res = await fetch(`${getApiBase()}/delete`, {
      method: 'DELETE',
      headers: buildHeaders(),
      body: JSON.stringify({ id: currentId })
    });
    const data = await res.json().catch(() => ({}));
    if (data.status === 'ok') {
      showToast('删除成功！', 'success');
      loadNext();
    } else {
      showToast('删除失败：' + (data.msg || '未知错误'), 'error');
    }
  } catch (e) {
    showToast('请求失败：' + e.message, 'error');
  }
}

document.getElementById('editModal').addEventListener('click', function(e) {
  if (e.target === this) closeEditModal();
});

document.addEventListener('keydown', function(e) {
  if (e.key === 'Escape') {
    closeEditModal();
    closeSettings();
  }
  if (e.key === ' ' && !e.target.matches('input, textarea')) {
    e.preventDefault();
    loadNext();
  }
});

window.onload = init;
</script>
