<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>我的个人语录工作台</title>
    <style>
        body { max-width: 600px; margin: 20px auto; padding: 20px; font-size: 16px; font-family: "Microsoft YaHei"; }
        .card { padding: 24px; border: 1px solid #eee; border-radius: 12px; margin: 20px 0; background: #fafafa; }
        .btn { padding: 10px 18px; margin: 6px; border: none; border-radius: 6px; cursor: pointer; font-size: 15px; }
        .helpful { background: #42b983; color:white; }
        .done { background: #3eafef; color:white; }
        .learned { background: #f3a860; color:white; }
        .next { background: #9c88ff; color:white; }
        small { color:#666; margin-top:10px; display:block; }
    </style>
</head>
<body>
    <h2>今日个人经验推送</h2>
    <div class="card" id="sayingCard">
        加载中...
    </div>

    <button class="btn helpful" onclick="sendFeedback('helpful')">有帮助！</button>
    <button class="btn done" onclick="sendFeedback('done')">做到了！</button>
    <button class="btn learned" onclick="sendFeedback('received')">知道了！</button>
    <button class="btn next" onclick="loadNext()">下一条 →</button>

    <script>
        let currentId = null;

        // 页面加载获取
        window.onload = async function () {
            loadNext();
        };

        // 统一加载下一条
        async function loadNext() {
            try {
                document.getElementById("sayingCard").innerText = "加载中...";
                const res = await fetch("/push");
                const data = await res.json();
                currentId = data.id;

                document.getElementById("sayingCard").innerHTML = `
                    <h3>${data.topic}</h3>
                    <p>${data.plaintext}</p>
                    <small>分类：${data.class} | 标签：${data.tag}</small>
                `;
            } catch (e) {
                document.getElementById("sayingCard").innerText = "加载失败";
            }
        }

        // 反馈
        async function sendFeedback(type) {
            if (!currentId) {
                alert("未加载语录");
                return;
            }
            await fetch("/feedback", {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({ id: currentId, type: type })
            });
            alert("反馈成功！");
        }
    </script>
</body>
</html>
